<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>X-Arts — 滾動試作</title>
<style>
  :root{ --fg:#eef3fb; --dim:rgba(238,243,251,.46); --line:rgba(238,243,251,.12); }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{background:#070709;color:var(--fg);overflow-x:hidden;
    font-family:"Helvetica Neue",-apple-system,"PingFang TC","Noto Sans TC",sans-serif;-webkit-font-smoothing:antialiased}

  /* 第一屏:一開始只有這個,作品要往下滑才出現 */
  .hero{height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;
    position:relative;text-align:center}
  .hero h1{font-size:clamp(40px,9vw,120px);font-weight:800;letter-spacing:-.04em;line-height:.9}
  .hero .sub{font-size:13px;letter-spacing:.34em;text-transform:uppercase;color:var(--dim)}
  .scrollcue{position:absolute;bottom:34px;left:50%;transform:translateX(-50%);
    font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:var(--dim);
    display:flex;flex-direction:column;align-items:center;gap:10px}
  .scrollcue .bar{width:1px;height:42px;background:linear-gradient(var(--dim),transparent);animation:drop 1.8s ease-in-out infinite}
  @keyframes drop{0%{transform:scaleY(.2);transform-origin:top}50%{transform:scaleY(1);transform-origin:top}100%{transform:scaleY(.2);transform-origin:bottom}}

  /* 作品大區塊:70% 靠左/右交替,另一邊 30% 空 */
  .exp{min-height:96vh;display:flex;align-items:center;padding:6vh 5vw}
  .exp.left{justify-content:flex-start}
  .exp.right{justify-content:flex-end}

  .card{position:relative;width:70%;aspect-ratio:16/10;border-radius:20px;overflow:hidden;
    background:#0e1118;border:1px solid var(--line);text-decoration:none;color:var(--fg);
    opacity:0;transform:translateY(56px) scale(.975);
    transition:opacity 1s cubic-bezier(.2,.8,.2,1),transform 1s cubic-bezier(.2,.8,.2,1);
    box-shadow:0 40px 90px rgba(0,0,0,.45)}
  .card.in{opacity:1;transform:none}
  @media(max-width:760px){ .card{width:100%;aspect-ratio:4/5} .exp{padding:5vh 5vw} }

  /* 圖片:預設黑灰,滑鼠移上去變彩色 */
  .card img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
    filter:grayscale(1) brightness(.5) contrast(.95);
    transform:scale(1.04);
    transition:filter .7s ease,transform 1.1s cubic-bezier(.2,.8,.2,1)}
  .card:hover img{filter:grayscale(0) brightness(1) contrast(1);transform:scale(1)}
  .card::after{content:"";position:absolute;inset:0;
    background:linear-gradient(180deg,rgba(7,7,9,.35),transparent 32%,transparent 58%,rgba(7,7,9,.78));
    pointer-events:none}

  /* 卡片上的字 */
  .meta{position:absolute;top:22px;left:24px;z-index:2;font-size:12px;letter-spacing:.18em;line-height:1.5}
  .meta b{font-weight:700}
  .arrow{position:absolute;top:20px;right:20px;z-index:2;width:42px;height:42px;border-radius:999px;
    background:#fff;color:#0a0a0a;display:flex;align-items:center;justify-content:center;font-size:18px;
    transition:transform .4s cubic-bezier(.2,.8,.2,1)}
  .card:hover .arrow{transform:rotate(45deg)}
  .info{position:absolute;left:26px;bottom:24px;z-index:2}
  .info .ttl{font-size:clamp(26px,3.4vw,52px);font-weight:700;letter-spacing:-.02em;
    height:1.12em;line-height:1.12;overflow:hidden}
  /* hover 時標題往下翻滾一次(幻燈片/翻牌) */
  .info .ttl .roll{display:block;transform:translateY(-50%);
    transition:transform .55s cubic-bezier(.62,0,.2,1)}
  .info .ttl .roll span{display:block;line-height:1.12}
  .card:hover .info .ttl .roll{transform:translateY(0)}
  .info .tags{margin-top:10px;font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.7)}

  footer{height:40vh;display:flex;align-items:center;justify-content:center;
    color:var(--dim);font-size:12px;letter-spacing:.2em;text-transform:uppercase}
</style>
</head>
<body>

  <header class="hero">
    <div class="sub">X·ARTS Studio — 2026</div>
    <h1>Selected<br>Works</h1>
    <div class="scrollcue"><span>Scroll</span><span class="bar"></span></div>
  </header>

  <main id="exps"></main>

  <footer>xarts.games — 試作 prototype</footer>

<script>
const WORKS = [
  { no:'001', title:'CatInsight AI', tags:'AI · ML · Finance', img:'/assets/shot-rank.png', url:'#' },
  { no:'002', title:'3D Museum',     tags:'WebGL · Three.js · Gallery', img:'/assets/shot-detail.png', url:'/gallery.html' },
  { no:'003', title:'Fluid Lab',     tags:'WebGL · GPGPU · Fluid', img:'/assets/cat-poster.jpg', url:'/water.html' },
  { no:'004', title:'Your Next Work',tags:'Coming Soon', img:'/assets/shot-chat.png', url:'#' },
];
const wrap = document.getElementById('exps');
WORKS.forEach((w,i)=>{
  const sec = document.createElement('section');
  sec.className = 'exp ' + (i%2===0 ? 'left' : 'right');
  sec.innerHTML = `
    <a class="card" href="${w.url}">
      <img src="${w.img}" alt="${w.title}" loading="lazy">
      <div class="meta"><b>EXP ${w.no}</b><br>2026</div>
      <div class="arrow">↗</div>
      <div class="info"><div class="ttl"><span class="roll"><span>${w.title}</span><span>${w.title}</span></span></div><div class="tags">${w.tags}</div></div>
    </a>`;
  wrap.appendChild(sec);
});

// 往下滑逐一浮現
const io = new IntersectionObserver((es)=>{
  es.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target); } });
}, { threshold:.25 });
document.querySelectorAll('.card').forEach(c=>io.observe(c));
</script>
</body>
</html>
