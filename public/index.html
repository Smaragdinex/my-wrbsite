<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>X-Arts — Selected Works</title>
<style>
  :root{ --fg:#f2f2f0; --dim:rgba(242,242,240,.45); }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{min-height:100%;background:#08080a;color:var(--fg);overflow-x:hidden;
    font-family:"Helvetica Neue",-apple-system,"PingFang TC","Noto Sans TC",sans-serif;
    -webkit-font-smoothing:antialiased}
  canvas#gl{position:fixed;inset:0;width:100%;height:100%;z-index:0}
  /* HUD:固定不隨捲動(左上貓/右上品牌+導覽/右下 xarts.games) */
  .wrap{position:fixed;inset:0;z-index:5;display:flex;flex-direction:column;
    padding:clamp(20px,4vw,52px);pointer-events:none}
  .topright{display:flex;align-items:flex-start;gap:clamp(16px,2vw,34px);pointer-events:auto}
  .topnav{display:flex;gap:clamp(14px,1.6vw,26px);align-items:center;padding-top:4px}
  .topnav a{font-size:17px;letter-spacing:.14em;text-transform:uppercase;color:var(--fg);opacity:.7;
    transition:opacity .3s;position:relative}
  .topnav a:hover{opacity:1}
  .topnav a::after{content:"";position:absolute;left:0;right:0;bottom:-5px;height:1px;background:currentColor;
    transform:scaleX(0);transform-origin:left;transition:transform .35s cubic-bezier(.2,.8,.2,1)}
  .topnav a:hover::after{transform:scaleX(1)}
  .hero{height:100vh}
  header{display:flex;justify-content:space-between;align-items:flex-start;
    font-size:13px;letter-spacing:.18em;text-transform:uppercase}
  .face{pointer-events:auto;line-height:0;filter:drop-shadow(0 2px 10px rgba(0,0,0,.4))}
  #eyes{transform-box:fill-box;transform-origin:center;transition:transform .12s ease}
  #eyes.blink{transform:scaleY(.08)}
  .pupil{transition:transform .18s cubic-bezier(.2,.8,.2,1)}
  .brand{display:flex;flex-direction:column;align-items:flex-end;gap:5px;text-align:right}
  header b{font-weight:700}
  header span{color:var(--dim)}
  .center{flex:1;display:flex;flex-direction:column;justify-content:center}
  .eyebrow{font-size:12px;letter-spacing:.32em;color:var(--dim);text-transform:uppercase;margin-bottom:26px}
  .list{display:flex;flex-direction:column;pointer-events:auto;width:min(100%,820px)}
  .work{display:flex;align-items:baseline;gap:22px;padding:clamp(10px,1.6vw,20px) 4px;
    border-top:1px solid rgba(242,242,240,.14);text-decoration:none;color:var(--fg);
    position:relative;transition:padding-left .5s cubic-bezier(.2,.8,.2,1)}
  .list .work:last-child{border-bottom:1px solid rgba(242,242,240,.14)}
  .work .no{font-size:13px;letter-spacing:.1em;color:var(--dim);width:34px;flex:none;
    transition:color .4s}
  .work .ttl{font-size:clamp(28px,5.2vw,62px);font-weight:600;line-height:1;
    letter-spacing:-.01em;transition:opacity .4s,transform .5s cubic-bezier(.2,.8,.2,1);
    text-shadow:0 2px 26px rgba(2,7,13,.62),0 1px 4px rgba(2,7,13,.5)}
  .work .tag{margin-left:auto;font-size:12px;letter-spacing:.14em;color:var(--dim);
    text-transform:uppercase;white-space:nowrap;opacity:0;transform:translateX(10px);
    transition:opacity .4s,transform .5s}
  .work:hover{padding-left:26px}
  .work:hover .no{color:var(--fg)}
  .work:hover .tag{opacity:1;transform:none}
  .list.hovering .work:not(:hover) .ttl{opacity:.32}
  footer{display:flex;justify-content:space-between;font-size:12px;letter-spacing:.14em;
    color:var(--dim);text-transform:uppercase}
  .hint{font-size:11px;letter-spacing:.2em}
  /* 滑鼠圓球 */
  .cursor{position:fixed;top:0;left:0;width:50px;height:50px;border-radius:50%;
    background:#fff;mix-blend-mode:difference;pointer-events:none;z-index:50;
    transform:translate(-50%,-50%);transition:width .35s cubic-bezier(.2,.8,.2,1),
    height .35s cubic-bezier(.2,.8,.2,1)}
  .cursor.big{width:96px;height:96px}
  .cursor.onnav{width:30px;height:30px}
  .cursor .view{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-size:11px;letter-spacing:.16em;color:#000;mix-blend-mode:difference;
    opacity:0;transition:opacity .3s;text-transform:uppercase}
  .cursor.big .view{opacity:1}
  @media (hover:none){ .cursor{display:none} html,body{cursor:auto} }
  @media (min-width:701px){ html,body{cursor:none} a{cursor:none} }

  /* ===== 往下滑出現的作品大區塊(70% 靠左/右交替,圖片黑灰→hover 彩色) ===== */
  .works{position:relative;z-index:2}
  .exp{height:100vh;display:flex;align-items:center;padding:6vh clamp(20px,5vw,64px)}
  .exp.left{justify-content:flex-start}
  .exp.right{justify-content:flex-end}
  .ecard{position:relative;width:70%;aspect-ratio:16/10;border-radius:20px;overflow:hidden;
    background:#0e1118;border:1px solid rgba(242,242,240,.12);text-decoration:none;color:var(--fg);
    opacity:0;transform:translateY(56px) scale(.975);
    transition:opacity 1s cubic-bezier(.2,.8,.2,1),transform 1s cubic-bezier(.2,.8,.2,1);
    box-shadow:0 40px 90px rgba(0,0,0,.5);pointer-events:auto}
  .ecard.in{opacity:1;transform:none}
  @media(max-width:760px){ .ecard{width:100%;aspect-ratio:4/5} .exp{padding:5vh 5vw} }
  .ecard img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
    filter:grayscale(1) brightness(.5) contrast(.95);transform:scale(1.04);
    transition:filter .7s ease,transform 1.1s cubic-bezier(.2,.8,.2,1)}
  .ecard:hover img{filter:grayscale(0) brightness(1) contrast(1);transform:scale(1)}
  .ecard::after{content:"";position:absolute;inset:0;pointer-events:none;
    background:linear-gradient(180deg,rgba(8,8,10,.35),transparent 32%,transparent 56%,rgba(8,8,10,.8))}
  .emeta{position:absolute;top:22px;left:24px;z-index:2;font-size:12px;letter-spacing:.18em;line-height:1.5}
  .emeta b{font-weight:700}
  .earrow{position:absolute;top:20px;right:20px;z-index:2;width:42px;height:42px;border-radius:999px;
    background:#fff;color:#0a0a0a;display:flex;align-items:center;justify-content:center;font-size:18px;
    transition:transform .4s cubic-bezier(.2,.8,.2,1)}
  .ecard:hover .earrow{transform:rotate(45deg)}
  .einfo{position:absolute;left:26px;bottom:24px;z-index:2}
  .einfo .ettl{font-size:clamp(26px,3.4vw,52px);font-weight:700;letter-spacing:-.02em;
    height:1.12em;line-height:1.12;overflow:hidden}
  .einfo .ettl .roll{display:block;transform:translateY(-50%);transition:transform .55s cubic-bezier(.62,0,.2,1)}
  .einfo .ettl .roll span{display:block;line-height:1.12}
  .ecard:hover .einfo .ettl .roll{transform:translateY(0)}
  .einfo .etags{margin-top:10px;font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.7)}
  .worksfoot{position:relative;z-index:2;height:34vh;display:flex;align-items:center;justify-content:center;
    color:var(--dim);font-size:12px;letter-spacing:.2em;text-transform:uppercase}
</style>
</head>
<body>

<div class="wrap">

<!-- 第一屏:只有固定 HUD + 粒子 X(往下滑才出現作品) -->
<div class="hero"></div>
<!-- 作品大區塊(無限往下迴圈) -->
<main class="works" id="works"></main>

<script type="module">
import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

/* ===== 你的 4 個作品 ===== */
const WORKS = [
  { no:'01', title:'CatGame',          tag:'p5.js · Web Game',          url:'https://github.com/Smaragdinex/cat-game', img:'/assets/shot-rank.png' },
  { no:'02', title:'KittyCafe',        tag:'iOS · Casual Game',         url:'https://apps.apple.com/tw/app/kitty-cafe-by-x-arts/id6758956069', img:'/assets/kittycafe.jpg' },
  { no:'03', title:'CatInsight Stock', tag:'AI Stock Research · iOS',   url:'/catinsight.html', img:'/assets/cat-poster.jpg' },
  { no:'04', title:'Ocean Cleanup',    tag:'iOS Game · Beach Cleanup',  url:'https://apps.apple.com/tw/app/id6771914760', img:'/assets/oceancleanup.jpg' },
];

/* ===== 游標 ===== */
const cursor = document.getElementById('cursor');
/* hover ABOUT/CONTACT 時圓點縮成 40px */
document.querySelectorAll('.topnav a').forEach(a => {
  a.addEventListener('mouseenter', () => cursor.classList.add('onnav'));
  a.addEventListener('mouseleave', () => cursor.classList.remove('onnav'));
});

/* ===== 往下滑出現的作品大區塊(70% 左右交替,圖黑灰→hover 彩色,標題翻滾) ===== */
const worksWrap = document.getElementById('works');
function buildCard(w, i){
  const sec = document.createElement('section');
  sec.className = 'exp ' + (i % 2 === 0 ? 'left' : 'right');
  sec.innerHTML = `
    <a class="ecard" href="${w.url}">
      <img src="${w.img}" alt="${w.title}" loading="lazy">
      <div class="emeta"><b>EXP ${w.no}</b><br>2026</div>
      <div class="earrow">↗</div>
      <div class="einfo">
        <div class="ettl"><span class="roll"><span>${w.title}</span><span>${w.title}</span></span></div>
        <div class="etags">${w.tag}</div>
      </div>
    </a>`;
  return sec;
}
WORKS.forEach((w, i) => worksWrap.appendChild(buildCard(w, i)));   // 原始 4 個
WORKS.forEach((w, i) => worksWrap.appendChild(buildCard(w, i)));   // 複製一份當迴圈緩衝

const _io = new IntersectionObserver((es) => {
  es.forEach(e => { if (e.isIntersecting) e.target.classList.add('in'); });
}, { threshold: .25 });
document.querySelectorAll('.ecard').forEach(c => _io.observe(c));

/* ===== 無限往下迴圈:滑過第 4 個後,無縫跳回第 1 個(內容相同→看不出接縫) ===== */
const N = WORKS.length;
let loopTick = false;
addEventListener('scroll', () => {
  if (loopTick) return; loopTick = true;
  requestAnimationFrame(() => {
    const vh = innerHeight;          // .hero 與 .exp 都是 100vh
    const loopH = N * vh;            // 4 個區塊的總高
    const y = scrollY;
    if (y >= vh + loopH) scrollTo(0, y - loopH);   // 到第 1 個複製品→跳回原始第 1 個
    loopTick = false;
  });
}, { passive: true });

/* ===== 滑鼠圓球位置跟隨 ===== */
const cur = { x: innerWidth/2, y: innerHeight/2, tx: innerWidth/2, ty: innerHeight/2 };

/* ===== 左上貓臉:眼睛跟滑鼠 + 眨眼 ===== */
const face = document.getElementById('face');
const pupils = face.querySelectorAll('.pupil');
const eyesG = document.getElementById('eyes');
let fc = { x:0, y:0 };
function faceCenter(){ const r = face.getBoundingClientRect(); fc.x = r.left + r.width/2; fc.y = r.top + r.height/2; }
faceCenter(); addEventListener('resize', faceCenter); addEventListener('scroll', faceCenter, {passive:true});
(function blink(){ eyesG.classList.add('blink'); setTimeout(()=>eyesG.classList.remove('blink'),140);
  setTimeout(blink, 2200 + Math.random()*3200); })();

/* =====================================================================
   WebGL：水中世界 = 全螢幕水面(水波+汽油虹光) + GPGPU 物理粒子 X
   - 粒子位置/速度存在貼圖裡，逐幀積分：被滑鼠水流推散 → 彈簧力慢慢漂回重組
   ===================================================================== */
const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('gl'), antialias:true, alpha:false });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setClearColor(0x06070a, 1);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.autoClear = false;

/* --- 全螢幕 quad（給所有 fullscreen pass 用）--- */
const fsCam = new THREE.OrthographicCamera(-1,1,1,-1,0,1);
const fsScene = new THREE.Scene();
const fsQuad = new THREE.Mesh(new THREE.PlaneGeometry(2,2));
fsScene.add(fsQuad);
const fsVert = `varying vec2 vUv; void main(){ vUv=uv; gl_Position=vec4(position.xy,0.,1.); }`;

/* --- 粒子數量 = 貼圖尺寸（每個 texel 一顆粒）--- */
const TEX = 216, COUNT = TEX*TEX;                 // 46,656 顆
// 兩根「長方體」立體方柱:沿對角線長,寬x厚均勻填滿→方正實心邊緣,交叉成 X
// ARM_SEP:把兩根柱子分到不同 z 深度(一前一後),交叉處才有真正的立體疊壓關係
const ARM_LEN = 2.15, ARM_W = 0.26, ARM_D = 0.26, ARM_SEP = 0.5;
function gauss(){ return ((Math.random()+Math.random()+Math.random())/1.5)-1.0; }
const SQ = 1/Math.SQRT2;

// 家位置(局部 X 形狀) + seed 存進 DataTexture
const homeData = new Float32Array(COUNT*4);
const aHome = new Float32Array(COUNT*3);
const aRef  = new Float32Array(COUNT*2);
const aSeed = new Float32Array(COUNT);
const aColor = new Float32Array(COUNT*3);

// 程式生成「星雲色票」:X 的每顆粒子依其 xy 取色 → 彩色點雲(取代原本灰色)
const NW = 256;
const ncv = document.createElement('canvas'); ncv.width = ncv.height = NW;
const nctx = ncv.getContext('2d');
nctx.fillStyle = '#0e1626'; nctx.fillRect(0,0,NW,NW);              // 暗藍底(空隙也有色)
nctx.globalCompositeOperation = 'lighter';
const nebBlobs = [
  [0.30,0.30, 95, '120,175,255'],   // 藍
  [0.72,0.26, 92, '178,128,255'],   // 紫
  [0.80,0.68, 98, '120,235,210'],   // 青綠
  [0.28,0.74, 98, '255,150,200'],   // 粉
  [0.50,0.50,130, '150,205,255'],   // 中央淡藍
];
for (const [cx,cy,rr,rgb] of nebBlobs){
  const g = nctx.createRadialGradient(cx*NW,cy*NW,0, cx*NW,cy*NW,rr);
  g.addColorStop(0, 'rgba('+rgb+',0.85)'); g.addColorStop(1, 'rgba('+rgb+',0)');
  nctx.fillStyle = g; nctx.fillRect(0,0,NW,NW);
}
const nebPix = nctx.getImageData(0,0,NW,NW).data;

for (let i=0;i<COUNT;i++){
  const arm = Math.random()<0.5 ? 1 : -1;
  const dx = SQ, dy = arm*SQ, px = -dy, py = dx;
  const u = (Math.random()*2-1)*ARM_LEN;   // 沿樑長
  const v = (Math.random()*2-1)*ARM_W;     // 樑寬(均勻填滿→方正)
  const w = (Math.random()*2-1)*ARM_D;     // 樑厚(z 方向,做出立體方柱)
  const hx = u*dx + v*px, hy = u*dy + v*py, hz = w + arm*ARM_SEP;  // arm 決定前/後深度
  const sd = Math.random();
  homeData[i*4+0]=hx; homeData[i*4+1]=hy; homeData[i*4+2]=hz; homeData[i*4+3]=sd;
  aHome[i*3+0]=hx; aHome[i*3+1]=hy; aHome[i*3+2]=hz;
  aRef[i*2+0]=((i%TEX)+0.5)/TEX; aRef[i*2+1]=((Math.floor(i/TEX))+0.5)/TEX;
  aSeed[i]=sd;
  // 依 home xy(約 ±2.5)取星雲色,稍微提亮+加底,確保不過暗
  const cu = Math.min(0.999, Math.max(0, hx/5.0 + 0.5));
  const cv = Math.min(0.999, Math.max(0, 0.5 - hy/5.0));
  const ci = (((cv*NW)|0)*NW + ((cu*NW)|0))*4;
  aColor[i*3+0] = Math.min(1, nebPix[ci]  /255*1.5 + 0.08);
  aColor[i*3+1] = Math.min(1, nebPix[ci+1]/255*1.5 + 0.08);
  aColor[i*3+2] = Math.min(1, nebPix[ci+2]/255*1.5 + 0.08);
}
const homeTex = new THREE.DataTexture(homeData, TEX, TEX, THREE.RGBAFormat, THREE.FloatType);
homeTex.minFilter = homeTex.magFilter = THREE.NearestFilter;
homeTex.needsUpdate = true;

/* --- ping-pong render targets：粒子 offset / velocity，水面 flow --- */
const dataOpt = { type:THREE.HalfFloatType, format:THREE.RGBAFormat, depthBuffer:false,
                  stencilBuffer:false, minFilter:THREE.NearestFilter, magFilter:THREE.NearestFilter };
let offA = new THREE.WebGLRenderTarget(TEX,TEX,dataOpt), offB = new THREE.WebGLRenderTarget(TEX,TEX,dataOpt);
let velA = new THREE.WebGLRenderTarget(TEX,TEX,dataOpt), velB = new THREE.WebGLRenderTarget(TEX,TEX,dataOpt);
const flowOpt = { type:THREE.HalfFloatType, format:THREE.RGBAFormat, depthBuffer:false,
                  stencilBuffer:false, minFilter:THREE.LinearFilter, magFilter:THREE.LinearFilter };
let watA = new THREE.WebGLRenderTarget(2,2,flowOpt), watB = new THREE.WebGLRenderTarget(2,2,flowOpt);
// 共用流體速度場(velocity advection):粒子與水波共讀同一張流體貼圖→整片同一股水流
const FLUIDRES = 192;
let fluidA = new THREE.WebGLRenderTarget(FLUIDRES,FLUIDRES,flowOpt), fluidB = new THREE.WebGLRenderTarget(FLUIDRES,FLUIDRES,flowOpt);

function clearRT(rt){ renderer.setRenderTarget(rt); renderer.clear(true,false,false); }
[offA,offB,velA,velB,watA,watB,fluidA,fluidB].forEach(clearRT);   // 初始 offset=0 vel=0 → 粒子先聚成 X

/* --- 旋轉函式：sim 與 render 必須一致（共用同一個 uTime）--- */
const ROT_GLSL = `
vec3 applyRot(vec3 p, float t){
  // 固定傾角(看得出立體厚度與前後交叉),不隨時間擺動 → X 完全靜止
  float ax = 0.10, ay = 0.16;
  float cx=cos(ax), sx=sin(ax);
  p = vec3(p.x, cx*p.y - sx*p.z, sx*p.y + cx*p.z);
  float cy=cos(ay), sy=sin(ay);
  p = vec3(cy*p.x + sy*p.z, p.y, -sy*p.x + cy*p.z);
  return p;
}`;

/* ===== 共用流體速度場 sim：semi-Lagrangian advection + 滑鼠動量 + 環境渦流 ===== */
const fluidSimMat = new THREE.ShaderMaterial({ vertexShader:fsVert, fragmentShader:`
precision highp float;
varying vec2 vUv;
uniform sampler2D uPrev;
uniform vec2 uMouse, uMouseVel;
uniform float uDt, uTime, uAspect, uDissip, uRadius, uForce, uAdvect, uAmb;
void main(){
  vec2 vel = texture2D(uPrev, vUv).xy;
  // semi-Lagrangian 自我搬運:場帶著自己流動→產生會流走、捲動的水流(非瞬時)
  vec2 src = vUv - vel * uDt * uAdvect;
  vel = texture2D(uPrev, src).xy;
  // 滑鼠動量注入(沿移動方向):動量之後被 advect 帶走、慢慢散開
  vec2 dv = vUv - uMouse; dv.x *= uAspect;
  float splat = exp(-dot(dv,dv)/uRadius);
  vel += uMouseVel * splat * uForce;
  // 環境緩流(curl):整片水永遠輕輕流動,有活水感
  vel += vec2(
    sin(vUv.y*7.0 + uTime*0.5) - cos(vUv.x*5.5 - uTime*0.4),
    sin(vUv.x*6.5 + uTime*0.45) - cos(vUv.y*8.0 - uTime*0.35)
  ) * uAmb;
  vel *= uDissip;                 // 衰減=慣性,停手後流動慢慢平息
  vel = clamp(vel, -3.0, 3.0);
  gl_FragColor = vec4(vel, 0.0, 1.0);
}`,
  uniforms:{ uPrev:{value:null}, uMouse:{value:new THREE.Vector2(.5,.5)}, uMouseVel:{value:new THREE.Vector2()},
    uDt:{value:0.016}, uTime:{value:0}, uAspect:{value:1}, uDissip:{value:0.984},
    uRadius:{value:0.0016}, uForce:{value:0.10}, uAdvect:{value:0.9}, uAmb:{value:0.0} }});

/* ===== 粒子速度 sim：水流推散 + 彈簧回家 + 阻尼 ===== */
const velSimMat = new THREE.ShaderMaterial({ vertexShader:fsVert, fragmentShader:`
precision highp float;
varying vec2 vUv;
uniform sampler2D uHome, uOffPrev, uVelPrev;
uniform vec3 uMouse;
uniform sampler2D uFluid;
uniform mat4 uViewProj;
uniform float uTime, uDt, uMouseStr, uRadius, uSpring, uDamp, uFlowPush, uZFlow;
${ROT_GLSL}
void main(){
  vec4 H = texture2D(uHome, vUv);
  vec3 home = H.xyz; float sd = H.w;
  vec3 off = texture2D(uOffPrev, vUv).xyz;
  vec3 vel = texture2D(uVelPrev, vUv).xyz;
  vec3 Rhome = applyRot(home, uTime);
  vec3 pos = Rhome + off;

  vec3 force = vec3(0.0);
  // === 取樣「共用流體場」:粒子被同一股水流帶走(advection) ===
  vec4 clip = uViewProj * vec4(pos, 1.0);
  vec2 suv = clip.xy / clip.w * 0.5 + 0.5;              // 粒子的螢幕座標→查流體貼圖
  vec2 flow = texture2D(uFluid, suv).xy;
  float fspeed = length(flow);
  force.xy += flow * uFlowPush;                         // 順水流被帶走(整片同一股流、會捲動)
  force.z  += fspeed * uZFlow;                          // z 軸水流:把顆粒往視覺前方(+z 朝我們)帶
  force.z  += (sd-0.5) * fspeed * 1.6;                  // 同時往深度散開→立體

  // 少量徑向撥開(撥水缺口),用世界座標滑鼠位置
  vec2 d = pos.xy - uMouse.xy;
  float dist = length(d);
  float infl = exp(-dist*dist / uRadius) * uMouseStr;
  vec2 dir = dist > 1e-4 ? d/dist : vec2(1.0,0.0);
  force.xy += dir * infl * 0.4;

  // 像在水中攪拌:被擾動的顆粒受亂流(curl 渦流場)混合,整個融進水裡;
  // disturb 隨「離家距離 + 滑鼠影響」變大→停手後顆粒仍懸浮亂流,再緩緩漂回
  float disturb = clamp(length(off)*0.55 + fspeed*2.2 + infl*0.4, 0.0, 1.8);
  vec3 tp = pos * 1.7;
  vec3 curl = vec3(
    sin(tp.y*1.7 + uTime*0.9) - cos(tp.z*1.3 - uTime*0.6),
    sin(tp.z*1.9 + uTime*0.7) - cos(tp.x*1.5 - uTime*0.5),
    sin(tp.x*1.4 + uTime*1.1) - cos(tp.y*1.8 - uTime*0.8)
  );
  force += curl * disturb * 1.3;                     // 只有被擾動(離家/流體/滑鼠)時才亂流,靜止完全不動

  // 彈簧拉回旋轉中的家（off=pos-Rhome）→ 滑鼠停下時慢慢重組成 X
  force += -uSpring * off;

  vel = (vel + force * uDt) * uDamp;
  gl_FragColor = vec4(vel, 1.0);
}`,
  uniforms:{ uHome:{value:homeTex}, uOffPrev:{value:null}, uVelPrev:{value:null},
    uMouse:{value:new THREE.Vector3(99,99,0)}, uFluid:{value:null}, uViewProj:{value:new THREE.Matrix4()},
    uTime:{value:0}, uDt:{value:0.016},
    uMouseStr:{value:0}, uRadius:{value:0.6}, uSpring:{value:1.15}, uDamp:{value:0.955},
    uFlowPush:{value:34.0}, uZFlow:{value:9.0} }});

/* ===== 粒子位置 sim：offset += vel*dt ===== */
const offSimMat = new THREE.ShaderMaterial({ vertexShader:fsVert, fragmentShader:`
precision highp float;
varying vec2 vUv;
uniform sampler2D uOffPrev, uVel;
uniform float uDt;
void main(){
  vec3 off = texture2D(uOffPrev, vUv).xyz;
  vec3 vel = texture2D(uVel, vUv).xyz;
  off += vel * uDt;
  gl_FragColor = vec4(off, 1.0);
}`,
  uniforms:{ uOffPrev:{value:null}, uVel:{value:null}, uDt:{value:0.016} }});

/* ===== 全螢幕水面 sim：Laplacian 波傳播 + 滑鼠擾動（產生水波紋）===== */
const watSimMat = new THREE.ShaderMaterial({ vertexShader:fsVert, fragmentShader:`
precision highp float;
varying vec2 vUv;
uniform sampler2D uPrev;
uniform vec2 uMouse, uVelocity, uRes;
uniform float uAspect, uFade, uRadius, uStrength;
void main(){
  vec2 st = 1.0/uRes;
  vec4 c = texture2D(uPrev, vUv);
  float n = texture2D(uPrev, vUv+vec2(0.0,st.y)).z;
  float s = texture2D(uPrev, vUv-vec2(0.0,st.y)).z;
  float e = texture2D(uPrev, vUv+vec2(st.x,0.0)).z;
  float w = texture2D(uPrev, vUv-vec2(st.x,0.0)).z;
  // 正確的 2D 波動方程：h' = 2h - h_prev + c²∇²h，再乘阻尼(uFade<1)使其穩定收斂
  float h = c.z, hPrev = c.w;
  float lap = (n + s + e + w - 4.0*h);
  vec2 velocity = c.xy * 0.94;
  float height = (2.0*h - hPrev + 0.24*lap) * uFade;
  // 滑鼠擾動注入:沿移動方向把 footprint 拉長→方向性水流尾跡(非對稱同心圓)
  vec2 dv = vUv - uMouse; dv.x *= uAspect;
  vec2 vdir = length(uVelocity) > 1e-4 ? normalize(uVelocity) : vec2(1.0, 0.0);
  float along = dot(dv, vdir);                       // 沿移動方向
  float perp  = dot(dv, vec2(-vdir.y, vdir.x));      // 垂直方向
  float mf = exp(-(along*along/(uRadius*5.0) + perp*perp/uRadius));  // 拉長5倍→橢圓尾跡
  velocity += uVelocity * mf * uStrength;
  height   += clamp(length(uVelocity), 0.0, 3.0) * mf * uStrength * 0.4;
  // 安全護欄：半浮點下夾住數值,杜絕指數放大→整片變白
  height   = clamp(height, -1.5, 1.5);
  velocity = clamp(velocity, -3.0, 3.0);
  gl_FragColor = vec4(velocity, height, h);
}`,
  uniforms:{ uPrev:{value:null}, uMouse:{value:new THREE.Vector2(.5,.5)}, uVelocity:{value:new THREE.Vector2()},
    uRes:{value:new THREE.Vector2(1,1)}, uAspect:{value:1}, uFade:{value:.984}, uRadius:{value:.0072}, uStrength:{value:.42} }});

/* ===== 全螢幕水面顯示：深水底色 + 水波處的汽油虹光 ===== */
const watShowMat = new THREE.ShaderMaterial({ vertexShader:fsVert, fragmentShader:`
precision highp float;
varying vec2 vUv;
uniform sampler2D uFlow, uFluid;
uniform float uTime;
vec3 oil(float t){ return 0.5 + 0.5*cos(6.28318*(t + vec3(0.0,0.33,0.67))); }
void main(){
  vec4 f = texture2D(uFlow, vUv);
  vec2 flow = texture2D(uFluid, vUv).xy;   // 共用流體場(與粒子同一股水流,有方向、會捲)
  float speed = length(flow);
  float h = f.z;                            // 水波高度(crest 漣漪)

  // 油膜座標被同一股水流「撥開」位移 → 油彩跟著水流被推走、拉伸
  vec2 warp = vUv + flow*0.12 + vec2(h*0.05);

  // 深水/油底色
  vec3 base = mix(vec3(0.030,0.040,0.058), vec3(0.010,0.015,0.026), vUv.y);
  float caustic = 0.5+0.5*sin(vUv.x*7.0+uTime*0.4)*sin(vUv.y*9.0-uTime*0.3);
  base += vec3(0.010,0.014,0.020) * caustic;

  // 全畫面汽油薄膜(身在油中):柔和粉彩乳白油膜(Lusion 風,低飽和、寬色帶)
  float bands = warp.x*1.7 - warp.y*1.2 + h*2.4 + speed*1.6 + uTime*0.02;
  vec3 irid = oil(bands);
  irid = mix(vec3(0.76,0.78,0.82), irid, 0.22);           // 大量乳白→非常淡的珍珠暈,不刺眼
  float wave = clamp(speed*2.6 + abs(h)*2.2, 0.0, 1.0);   // 水浪強度
  float ambient = 0.03;                                   // 平時極淡油彩=在油中

  vec3 col = base + irid * (ambient + wave*0.28);
  col += vec3(0.06,0.09,0.14) * max(0.0,h) * 0.8;         // 浪峰柔亮邊(調暗)
  col += vec3(h*0.03);
  gl_FragColor = vec4(col, 1.0);
}`,
  uniforms:{ uFlow:{value:null}, uFluid:{value:null}, uTime:{value:0} }});

/* ===== 粒子 X 渲染（白色顆粒，淡，不搶選單）===== */
const perspCam = new THREE.PerspectiveCamera(48, innerWidth/innerHeight, 0.1, 100);
perspCam.position.set(0,0,5.2); perspCam.lookAt(0,0,0);

const geo = new THREE.BufferGeometry();
geo.setAttribute('position', new THREE.BufferAttribute(aHome.slice(), 3)); // 佔位
geo.setAttribute('aHome', new THREE.BufferAttribute(aHome, 3));
geo.setAttribute('aRef',  new THREE.BufferAttribute(aRef, 2));
geo.setAttribute('aSeed', new THREE.BufferAttribute(aSeed, 1));
geo.setAttribute('aColor', new THREE.BufferAttribute(aColor, 3));

const pointsMat = new THREE.ShaderMaterial({
  transparent:true, depthTest:false, depthWrite:false, blending:THREE.NormalBlending,
  uniforms:{ uOff:{value:null}, uVel:{value:null}, uTime:{value:0},
    uSize:{value:Math.min(devicePixelRatio,2)}, uHover:{value:0} },
  vertexShader:`
precision highp float;
attribute vec3 aHome; attribute vec2 aRef; attribute float aSeed; attribute vec3 aColor;
uniform sampler2D uOff, uVel;
uniform float uTime, uSize, uHover;
varying float vSpeed; varying float vSeed; varying float vDepth; varying vec3 vColor;
${ROT_GLSL}
void main(){
  vec3 off = texture2D(uOff, aRef).xyz;
  vec3 vel = texture2D(uVel, aRef).xyz;
  vec3 pos = applyRot(aHome, uTime) + off;     // 固定 X:被滑鼠打散後靠彈簧回原位
  vSpeed = length(vel); vSeed = aSeed; vColor = aColor;
  vec4 mv = modelViewMatrix * vec4(pos, 1.0);
  vDepth = -mv.z;
  gl_Position = projectionMatrix * mv;
  float sz = (19.0 + aSeed*22.0) * (1.0 + uHover*0.4 + vSpeed*0.5);
  gl_PointSize = sz * uSize / -mv.z;
}`,
  fragmentShader:`
precision highp float;
varying float vSpeed; varying float vSeed; varying float vDepth; varying vec3 vColor;
uniform float uTime, uHover;
vec3 oil(float t){ return 0.5 + 0.5*cos(6.28318*(t + vec3(0.0,0.33,0.67))); }
void main(){
  vec2 pc = gl_PointCoord - 0.5;
  float r = length(pc);
  if (r > 0.5) discard;
  float a = smoothstep(0.5, 0.0, r); a *= a;

  float sheen = clamp(vSpeed*0.7, 0.0, 1.0);          // 流動時才泛汽油虹光
  vec3 base = vColor;                                 // 星雲色票取的顏色(彩色點雲)
  vec3 irid = oil(vSeed + vSpeed*0.6 + vDepth*0.08 + uTime*0.02);
  vec3 col = mix(base, mix(base, irid, 0.5), sheen);  // 流動時微微泛汽油虹光
  col += sheen * 0.12 + uHover * 0.06;

  gl_FragColor = vec4(col, a * (0.42 + sheen*0.34 + uHover*0.12));
}`});
const points = new THREE.Points(geo, pointsMat);
const pointsScene = new THREE.Scene(); pointsScene.add(points);

/* ===== 穿越銀河星場(Star Wars 超空間):粒子由中心朝相機飛來→投影上從中心往外噴射 =====
   完全獨立於固定 X(不讀 uOff/uVel),所以 X 靜止不動,只有這些星點在飛 */
const STARC = 4200;
const starPos = new Float32Array(STARC*3), starSeed = new Float32Array(STARC);
for (let i=0;i<STARC;i++){
  const ang = Math.random()*Math.PI*2, rad = Math.sqrt(Math.random())*3.4;  // 均勻散在圓盤
  starPos[i*3+0] = Math.cos(ang)*rad;
  starPos[i*3+1] = Math.sin(ang)*rad;
  starPos[i*3+2] = 0;
  starSeed[i] = Math.random();
}
const starGeo = new THREE.BufferGeometry();
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos,3));
starGeo.setAttribute('aSeed', new THREE.BufferAttribute(starSeed,1));
const starMat = new THREE.ShaderMaterial({
  transparent:true, depthTest:false, depthWrite:false, blending:THREE.AdditiveBlending,
  uniforms:{ uTime:{value:0}, uSize:{value:Math.min(devicePixelRatio,2)}, uSpeed:{value:0.09}, uAlpha:{value:0.7} },
  vertexShader:`
precision highp float;
attribute float aSeed;
uniform float uTime, uSize, uSpeed;
varying float vB;
void main(){
  float ph = fract(aSeed + uTime*uSpeed*(0.6 + aSeed*0.8)); // 0(遠/近中心)→1(近相機/外緣)
  float z = mix(-6.0, 4.7, ph);                             // 從遠處朝相機(5.2)飛來
  vec3 pos = vec3(position.xy, z);                          // 同一 xy、z 往前→透視投影往外噴
  vB = sin(ph * 3.14159);                                   // 兩端淡出:隱藏循環接縫 + 避免貼臉爆大
  vec4 mv = modelViewMatrix * vec4(pos, 1.0);
  gl_Position = projectionMatrix * mv;
  gl_PointSize = clamp((19.0 + aSeed*22.0) * uSize / -mv.z, 0.0, 48.0);  // 與 X 粒子同基準大小
}`,
  fragmentShader:`
precision highp float;
varying float vB;
uniform float uAlpha;
void main(){
  vec2 pc = gl_PointCoord - 0.5; float r = length(pc);
  if (r > 0.5) discard;
  float a = smoothstep(0.5, 0.0, r); a *= a;
  gl_FragColor = vec4(vec3(0.72,0.77,0.92), a * clamp(vB,0.0,1.0) * uAlpha);  // 冷白星點
}`});
const starPoints = new THREE.Points(starGeo, starMat);
starPoints.frustumCulled = false;
pointsScene.add(starPoints);

/* ===== ember:從固定 X 表面往前(朝相機)飄散、匯入星海的稀疏顆粒 =====
   讓靜止的 X 與往前飛的銀河連起來;只取約 22% 的點,在 X 處隱形、往前才亮、淡出循環,
   所以 X 核心仍完全固定不動,只是「送」細顆粒往前流 */
const emberMat = new THREE.ShaderMaterial({
  transparent:true, depthTest:false, depthWrite:false, blending:THREE.AdditiveBlending,
  uniforms:{ uTime:{value:0}, uSize:{value:Math.min(devicePixelRatio,2)}, uSpeed:{value:0.16}, uDist:{value:3.0}, uAlpha:{value:0.5} },
  vertexShader:`
precision highp float;
attribute vec3 aHome; attribute float aSeed;
uniform float uTime, uSize, uSpeed, uDist;
varying float vB; varying float vCull;
${ROT_GLSL}
void main(){
  vec3 pos = applyRot(aHome, uTime);                  // 從固定 X 的位置出發
  float ph = fract(aSeed*17.0 + uTime*uSpeed*(0.6 + aSeed*0.8));
  pos.z += ph * uDist;                                // 往相機(+z)漂→投影上往外匯入星海
  vB = sin(ph * 3.14159);                             // X 處=0(不動到核心)、中途最亮、前緣淡出
  vCull = step(aSeed, 0.22);                          // 只取約 22% 當 ember(稀疏)
  vec4 mv = modelViewMatrix * vec4(pos, 1.0);
  gl_Position = projectionMatrix * mv;
  gl_PointSize = vCull * clamp((6.0 + aSeed*8.0) * uSize / -mv.z, 0.0, 40.0);
}`,
  fragmentShader:`
precision highp float;
varying float vB; varying float vCull;
uniform float uAlpha;
void main(){
  if (vCull < 0.5) discard;
  vec2 pc = gl_PointCoord - 0.5; float r = length(pc);
  if (r > 0.5) discard;
  float a = smoothstep(0.5, 0.0, r); a *= a;
  gl_FragColor = vec4(vec3(0.70,0.76,0.92), a * clamp(vB,0.0,1.0) * uAlpha);
}`});
const emberPoints = new THREE.Points(geo, emberMat);
emberPoints.frustumCulled = false;
pointsScene.add(emberPoints);

/* ===== 滑鼠輸入 ===== */
const ndc = new THREE.Vector2(99,99);
const raycaster = new THREE.Raycaster();
const plane = new THREE.Plane(new THREE.Vector3(0,0,1), 0);
const hit = new THREE.Vector3();
let mouseInside = false;
const watMouse = new THREE.Vector2(.5,.5), watPrev = new THREE.Vector2(.5,.5), watVel = new THREE.Vector2();
// 世界座標滑鼠速度向量(含慣性):捕捉「往哪動、多快」→ 驅動流體推水
const mouseWorldPrev = new THREE.Vector3(99,99,0); let hasMousePrev = false;
const mouseVel = new THREE.Vector3();

addEventListener('pointermove', e => {
  cur.tx = e.clientX; cur.ty = e.clientY;
  mouseInside = true;
  // 世界座標（給粒子）
  ndc.set(e.clientX/innerWidth*2-1, -(e.clientY/innerHeight)*2+1);
  raycaster.setFromCamera(ndc, perspCam);
  if (raycaster.ray.intersectPlane(plane, hit)) {
    velSimMat.uniforms.uMouse.value.copy(hit);
    // deltaX/deltaY:這一幀與上一幀之間,滑鼠在世界座標的位移向量 = 方向 × 瞬間速度
    if (hasMousePrev) mouseVel.set(hit.x - mouseWorldPrev.x, hit.y - mouseWorldPrev.y, 0);
    mouseWorldPrev.copy(hit); hasMousePrev = true;
  }
  velSimMat.uniforms.uMouseStr.value = 16.0;          // 影響範圍強度(停手後在 step 衰減)
  // 正規化座標（給水面 sim）
  watMouse.set(e.clientX/innerWidth, 1 - e.clientY/innerHeight);
  watVel.subVectors(watMouse, watPrev).multiplyScalar(60); watPrev.copy(watMouse);
});
addEventListener('pointerleave', () => { mouseInside = false; });

/* ===== hover 作品：增強虹光 ===== */
let hoverTarget = 0;
function switchTo(i){ hoverTarget = i < 0 ? 0 : 1; }

/* ===== resize ===== */
function resize(){
  const w=innerWidth, h=innerHeight, dpr=renderer.getPixelRatio();
  renderer.setSize(w,h);
  perspCam.aspect = w/h; perspCam.updateProjectionMatrix();
  const sw=Math.max(2,Math.round(w*dpr*.5)), sh=Math.max(2,Math.round(h*dpr*.5));
  watA.setSize(sw,sh); watB.setSize(sw,sh);
  watSimMat.uniforms.uRes.value.set(sw,sh); watSimMat.uniforms.uAspect.value = w/h;
  fluidSimMat.uniforms.uAspect.value = w/h;
  pointsMat.uniforms.uSize.value = dpr;
  starMat.uniforms.uSize.value = dpr;
  emberMat.uniforms.uSize.value = dpr;
}
addEventListener('resize', resize); resize();

/* ===== 渲染循環 ===== */
function blit(mat, target){ fsQuad.material = mat; renderer.setRenderTarget(target); renderer.render(fsScene, fsCam); }
const viewProj = new THREE.Matrix4();
let t0 = performance.now();
function frame(){
  const now = performance.now();
  const dt = Math.min(0.033, (now-t0)/1000); t0 = now;
  const time = now * 0.001;

  // 游標球
  cur.x += (cur.tx-cur.x)*.18; cur.y += (cur.ty-cur.y)*.18;
  cursor.style.transform = `translate(${cur.x}px,${cur.y}px) translate(-50%,-50%)`;
  // 貓眼注視
  { const dx=cur.tx-fc.x, dy=cur.ty-fc.y, d=Math.hypot(dx,dy)||1, k=Math.min(1,d/260)*4.6;
    const ox=(dx/d*k).toFixed(1), oy=(dy/d*k).toFixed(1);
    pupils.forEach(p=>p.setAttribute('transform',`translate(${ox} ${oy})`)); }

  // 滑鼠停下/離開 → 推力歸零，粒子靠彈簧慢慢重組成 X
  velSimMat.uniforms.uMouseStr.value *= mouseInside ? 0.90 : 0.82;
  hoverTarget; pointsMat.uniforms.uHover.value += (hoverTarget - pointsMat.uniforms.uHover.value)*0.06;

  // 相機 view-projection(把粒子世界座標投到螢幕,用來查共用流體場)
  perspCam.updateMatrixWorld();
  viewProj.multiplyMatrices(perspCam.projectionMatrix, perspCam.matrixWorldInverse);

  // 0) 共用流體場 sim:advection + 滑鼠動量 → fluidB(粒子與水波都讀它)
  fluidSimMat.uniforms.uPrev.value = fluidA.texture;
  fluidSimMat.uniforms.uMouse.value.copy(watMouse);
  fluidSimMat.uniforms.uMouseVel.value.copy(watVel);
  fluidSimMat.uniforms.uDt.value = dt; fluidSimMat.uniforms.uTime.value = time;
  blit(fluidSimMat, fluidB); [fluidA,fluidB]=[fluidB,fluidA];

  // 1) 水面 sim
  watSimMat.uniforms.uPrev.value = watA.texture;
  watSimMat.uniforms.uMouse.value.copy(watMouse);
  watSimMat.uniforms.uVelocity.value.copy(watVel);
  blit(watSimMat, watB); [watA,watB]=[watB,watA];
  watVel.multiplyScalar(.86);

  // 2) 粒子速度 sim → velB
  velSimMat.uniforms.uOffPrev.value = offA.texture;
  velSimMat.uniforms.uVelPrev.value = velA.texture;
  velSimMat.uniforms.uFluid.value = fluidA.texture;     // 共用流體場(粒子被同一股水流帶走)
  velSimMat.uniforms.uViewProj.value.copy(viewProj);
  velSimMat.uniforms.uTime.value = time; velSimMat.uniforms.uDt.value = dt;
  blit(velSimMat, velB);
  // 3) 粒子位置 sim：offA + velB → offB
  offSimMat.uniforms.uOffPrev.value = offA.texture;
  offSimMat.uniforms.uVel.value = velB.texture;
  offSimMat.uniforms.uDt.value = dt;
  blit(offSimMat, offB);
  [velA,velB]=[velB,velA]; [offA,offB]=[offB,offA];

  // 4) 上螢幕：水面背景 → 粒子 X
  renderer.setRenderTarget(null);
  renderer.clear(true, true, true);
  watShowMat.uniforms.uFlow.value = watA.texture; watShowMat.uniforms.uFluid.value = fluidA.texture; watShowMat.uniforms.uTime.value = time;
  fsQuad.material = watShowMat; renderer.render(fsScene, fsCam);
  pointsMat.uniforms.uOff.value = offA.texture;
  pointsMat.uniforms.uVel.value = velA.texture;
  pointsMat.uniforms.uTime.value = time;
  starMat.uniforms.uTime.value = time;
  emberMat.uniforms.uTime.value = time;
  renderer.render(pointsScene, perspCam);

  requestAnimationFrame(frame);
}
frame();
</script>
