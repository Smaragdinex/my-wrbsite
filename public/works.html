<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>X-Arts — Selected Works</title>
<style>
  :root{ --fg:#f2f2f0; --dim:rgba(242,242,240,.45); }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:#08080a;color:var(--fg);overflow:hidden;
    font-family:"Helvetica Neue",-apple-system,"PingFang TC","Noto Sans TC",sans-serif;
    -webkit-font-smoothing:antialiased}
  canvas#gl{position:fixed;inset:0;width:100%;height:100%;z-index:0}
  .wrap{position:relative;z-index:2;height:100%;display:flex;flex-direction:column;
    padding:clamp(20px,4vw,52px);pointer-events:none}
  header{display:flex;justify-content:space-between;align-items:flex-start;
    font-size:13px;letter-spacing:.18em;text-transform:uppercase}
  .face{pointer-events:auto;line-height:0;filter:drop-shadow(0 2px 10px rgba(0,0,0,.4))}
  #eyes{transform-box:fill-box;transform-origin:center;transition:transform .12s ease}
  #eyes.blink{transform:scaleY(.08)}
  .pupil{transition:transform .18s cubic-bezier(.2,.8,.2,1)}
  .brand{display:flex;flex-direction:column;align-items:flex-end;gap:5px;text-align:right}
  header b{font-weight:700}
  header span{color:var(--dim)}
  .center{flex:1;display:flex;flex-direction:column;justify-content:center}
  .eyebrow{font-size:12px;letter-spacing:.32em;color:var(--dim);text-transform:uppercase;margin-bottom:26px}
  .list{display:flex;flex-direction:column;pointer-events:auto;width:min(100%,820px)}
  .work{display:flex;align-items:baseline;gap:22px;padding:clamp(10px,1.6vw,20px) 4px;
    border-top:1px solid rgba(242,242,240,.14);text-decoration:none;color:var(--fg);
    position:relative;transition:padding-left .5s cubic-bezier(.2,.8,.2,1)}
  .list .work:last-child{border-bottom:1px solid rgba(242,242,240,.14)}
  .work .no{font-size:13px;letter-spacing:.1em;color:var(--dim);width:34px;flex:none;
    transition:color .4s}
  .work .ttl{font-size:clamp(28px,5.2vw,62px);font-weight:600;line-height:1;
    letter-spacing:-.01em;transition:opacity .4s,transform .5s cubic-bezier(.2,.8,.2,1)}
  .work .tag{margin-left:auto;font-size:12px;letter-spacing:.14em;color:var(--dim);
    text-transform:uppercase;white-space:nowrap;opacity:0;transform:translateX(10px);
    transition:opacity .4s,transform .5s}
  .work:hover{padding-left:26px}
  .work:hover .no{color:var(--fg)}
  .work:hover .tag{opacity:1;transform:none}
  .list.hovering .work:not(:hover) .ttl{opacity:.32}
  footer{display:flex;justify-content:space-between;font-size:12px;letter-spacing:.14em;
    color:var(--dim);text-transform:uppercase}
  .hint{font-size:11px;letter-spacing:.2em}
  /* 滑鼠圓球 */
  .cursor{position:fixed;top:0;left:0;width:13px;height:13px;border-radius:50%;
    background:#fff;mix-blend-mode:difference;pointer-events:none;z-index:50;
    transform:translate(-50%,-50%);transition:width .35s cubic-bezier(.2,.8,.2,1),
    height .35s cubic-bezier(.2,.8,.2,1)}
  .cursor.big{width:96px;height:96px}
  .cursor .view{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-size:11px;letter-spacing:.16em;color:#000;mix-blend-mode:difference;
    opacity:0;transition:opacity .3s;text-transform:uppercase}
  .cursor.big .view{opacity:1}
  @media (hover:none){ .cursor{display:none} html,body{cursor:auto} }
  @media (min-width:701px){ html,body{cursor:none} a{cursor:none} }
</style>
</head>
<body>
<canvas id="gl"></canvas>

<div class="cursor" id="cursor"><span class="view">View</span></div>

<div class="wrap">
  <header>
    <div class="face" id="face">
      <svg viewBox="0 0 100 100" width="56" height="56" aria-hidden="true">
        <path d="M24 34 L31 10 L48 28 Z" fill="#f2f2f0"/>
        <path d="M76 34 L69 10 L52 28 Z" fill="#f2f2f0"/>
        <path d="M30 28 L33 17 L41 27 Z" fill="#e58a9a"/>
        <path d="M70 28 L67 17 L59 27 Z" fill="#e58a9a"/>
        <circle cx="50" cy="56" r="33" fill="#f2f2f0"/>
        <g id="eyes">
          <ellipse cx="39" cy="54" rx="8.5" ry="10.5" fill="#16181f"/>
          <ellipse cx="61" cy="54" rx="8.5" ry="10.5" fill="#16181f"/>
          <circle class="pupil" cx="39" cy="54" r="3.4" fill="#f7c948"/>
          <circle class="pupil" cx="61" cy="54" r="3.4" fill="#f7c948"/>
          <circle class="pupil" cx="40.4" cy="52.2" r="1.1" fill="#fff"/>
          <circle class="pupil" cx="62.4" cy="52.2" r="1.1" fill="#fff"/>
        </g>
        <path d="M47 64 L53 64 L50 67 Z" fill="#e58a9a"/>
        <path d="M50 67 q-4 5 -8 2 M50 67 q4 5 8 2" stroke="#16181f" stroke-width="1.4" fill="none" stroke-linecap="round"/>
        <g stroke="#cfcfca" stroke-width="1" stroke-linecap="round">
          <line x1="20" y1="60" x2="36" y2="62"/><line x1="19" y1="66" x2="36" y2="66"/>
          <line x1="80" y1="60" x2="64" y2="62"/><line x1="81" y1="66" x2="64" y2="66"/>
        </g>
      </svg>
    </div>
    <div class="brand"><b>X·ARTS</b><span>Studio&nbsp;— 2026</span></div>
  </header>

  <div class="center">
    <div class="eyebrow">Selected Works</div>
    <nav class="list" id="list"></nav>
  </div>

  <footer>
    <span class="hint">滑動滑鼠 — 像水一樣撥開鹽粒，汽油虹光隨波蕩漾</span>
    <span>xarts.games</span>
  </footer>
</div>

<script type="module">
import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

/* ===== 你的 4 個作品 ===== */
const WORKS = [
  { no:'01', title:'CatInsight AI', tag:'AI Stock Signals',  url:'#' },
  { no:'02', title:'3D Museum',     tag:'WebGL Gallery',     url:'gallery.html' },
  { no:'03', title:'Fluid Lab',     tag:'GPGPU Water',       url:'water.html' },
  { no:'04', title:'Your Next Work',tag:'Coming Soon',       url:'#' },
];

/* ===== 作品清單 DOM ===== */
const list = document.getElementById('list');
const cursor = document.getElementById('cursor');

WORKS.forEach((w, i) => {
  const a = document.createElement('a');
  a.className = 'work'; a.href = w.url;
  a.innerHTML = `<span class="no">${w.no}</span><span class="ttl">${w.title}</span><span class="tag">${w.tag}</span>`;
  a.addEventListener('mouseenter', () => { switchTo(i); cursor.classList.add('big'); });
  list.appendChild(a);
});
list.addEventListener('mouseenter', () => list.classList.add('hovering'));
list.addEventListener('mouseleave', () => { list.classList.remove('hovering'); cursor.classList.remove('big'); switchTo(-1); });

/* ===== 滑鼠圓球位置跟隨 ===== */
const cur = { x: innerWidth/2, y: innerHeight/2, tx: innerWidth/2, ty: innerHeight/2 };

/* ===== 左上貓臉:眼睛跟滑鼠 + 眨眼 ===== */
const face = document.getElementById('face');
const pupils = face.querySelectorAll('.pupil');
const eyesG = document.getElementById('eyes');
let fc = { x:0, y:0 };
function faceCenter(){ const r = face.getBoundingClientRect(); fc.x = r.left + r.width/2; fc.y = r.top + r.height/2; }
faceCenter(); addEventListener('resize', faceCenter); addEventListener('scroll', faceCenter, {passive:true});
(function blink(){ eyesG.classList.add('blink'); setTimeout(()=>eyesG.classList.remove('blink'),140);
  setTimeout(blink, 2200 + Math.random()*3200); })();

/* ===== WebGL：3D 鹽粒 X 粒子場 ===== */
const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('gl'), antialias:true, alpha:false });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setClearColor(0x08080a, 1);
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();
const cam = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.1, 100);
cam.position.set(0, 0, 6);
cam.lookAt(0, 0, 0);

/* --- 產生排成「X」的粒子家位置 --- */
const COUNT = 46000;
const home = new Float32Array(COUNT * 3);
const seed = new Float32Array(COUNT);
const ARM_LEN = 2.05, ARM_W = 0.14, ARM_D = 0.15;
// 近似常態分佈（讓鹽粒邊緣柔散，中央較密）
function gauss(){ return ((Math.random()+Math.random()+Math.random()) / 1.5) - 1.0; }
const SQ = 1/Math.SQRT2;
for (let i=0;i<COUNT;i++){
  const arm = Math.random() < 0.5 ? 1 : -1;        // 兩條對角臂組成 X
  const dx = SQ, dy = arm*SQ;                        // 臂方向
  const px = -dy, py = dx;                           // 垂直方向（寬度）
  const u = (Math.random()*2-1) * ARM_LEN;           // 沿臂長
  const v = gauss() * ARM_W;                         // 臂寬（柔散）
  const w = gauss() * ARM_D;                         // 厚度（立體感）
  home[i*3+0] = u*dx + v*px;
  home[i*3+1] = u*dy + v*py;
  home[i*3+2] = w;
  seed[i] = Math.random();
}
const geo = new THREE.BufferGeometry();
geo.setAttribute('position', new THREE.BufferAttribute(home.slice(), 3)); // 佔位，實際位移在 shader
geo.setAttribute('aHome', new THREE.BufferAttribute(home, 3));
geo.setAttribute('aSeed', new THREE.BufferAttribute(seed, 1));

const MAX_RIPPLES = 12;
const ripUniform = [];
for (let i=0;i<MAX_RIPPLES;i++) ripUniform.push(new THREE.Vector3());

const uniforms = {
  uTime:        { value: 0 },
  uMouse:       { value: new THREE.Vector3(99,99,0) }, // 世界座標滑鼠（z=0 平面）
  uMouseStr:    { value: 0 },
  uRepelRadius: { value: 0.10 },
  uRipples:     { value: ripUniform },
  uRippleCount: { value: 0 },
  uColor:       { value: 0.85 },
  uHover:       { value: 0 },
  uSize:        { value: Math.min(devicePixelRatio,2) },
};

const vert = `
precision highp float;
attribute vec3 aHome;
attribute float aSeed;
uniform float uTime, uMouseStr, uRepelRadius, uColor, uHover, uSize;
uniform vec3 uMouse;
uniform vec3 uRipples[${MAX_RIPPLES}];
uniform int uRippleCount;
varying float vDisp; varying float vDepth; varying float vSeed;

vec3 rotX(vec3 p, float a){ float c=cos(a),s=sin(a); return vec3(p.x, c*p.y-s*p.z, s*p.y+c*p.z); }
vec3 rotY(vec3 p, float a){ float c=cos(a),s=sin(a); return vec3(c*p.x+s*p.z, p.y, -s*p.x+c*p.z); }

void main(){
  // 緩慢翻轉，立體 X
  vec3 p = aHome;
  p = rotY(p, sin(uTime*0.12)*0.32);
  p = rotX(p, sin(uTime*0.09)*0.17);

  // 鹽粒在原地細微漂浮（閒置也有生命）
  p += 0.013 * vec3(
      sin(uTime*0.7 + aSeed*40.0),
      cos(uTime*0.6 + aSeed*33.0),
      sin(uTime*0.9 + aSeed*27.0));

  float disp = 0.0;

  // 滑鼠像水一樣把鹽粒撥開
  vec2 md = p.xy - uMouse.xy;
  float mdist = length(md);
  float infl = exp(-mdist*mdist / uRepelRadius) * uMouseStr;
  vec2 mdir = mdist > 1e-4 ? md/mdist : vec2(0.0);
  p.xy += mdir * infl;
  p.z  += infl * 0.55;
  disp += infl;

  // 擴散水波（一圈圈推開）
  for (int i=0;i<${MAX_RIPPLES};i++){
    if (i >= uRippleCount) break;
    vec3 r = uRipples[i];
    float age = r.z;
    float rad = age * 1.7;
    float dd  = distance(p.xy, r.xy);
    float band = exp(-pow((dd - rad)*3.2, 2.0));   // 細環
    float life = max(0.0, 1.0 - age*0.5);
    vec2 rdir = dd > 1e-4 ? (p.xy - r.xy)/dd : vec2(0.0);
    p.xy += rdir * band * life * 0.13;
    p.z  += band * life * 0.20 * sin(age*6.0);
    disp += band * life;
  }

  vDisp = disp; vSeed = aSeed;
  vec4 mv = modelViewMatrix * vec4(p, 1.0);
  vDepth = -mv.z;
  gl_Position = projectionMatrix * mv;
  float s = (24.0 + aSeed*42.0) * (1.0 + uHover*0.35 + disp*0.7);
  gl_PointSize = s * uSize / -mv.z;
}`;

const frag = `
precision highp float;
varying float vDisp; varying float vDepth; varying float vSeed;
uniform float uTime, uColor, uHover;

void main(){
  vec2 pc = gl_PointCoord - 0.5;
  float r = length(pc);
  if (r > 0.5) discard;
  float alpha = smoothstep(0.5, 0.0, r);
  alpha *= alpha;

  // 汽油薄膜干涉虹彩（餘弦調色盤），刻意「很淺」
  float t = vSeed + vDisp*0.85 + vDepth*0.14 + uTime*0.03;
  vec3 a  = vec3(0.70, 0.71, 0.76);
  vec3 b  = vec3(0.22, 0.20, 0.26);
  vec3 ph = vec3(0.00, 0.33, 0.67);
  vec3 irid = a + b * cos(6.28318 * (t + ph));

  float sheen = clamp(vDisp*1.3, 0.0, 1.0);          // 被擾動越多→虹光越強
  vec3 salt = vec3(0.58, 0.60, 0.66);                // 靜止時的淡鹽白
  vec3 col = mix(salt, irid, (0.30 + sheen*0.70) * uColor);
  col += sheen * 0.18;                                // 撥開瞬間的閃光
  col += uHover * 0.08;

  gl_FragColor = vec4(col, alpha * (0.55 + sheen*0.40 + uHover*0.15));
}`;

const mat = new THREE.ShaderMaterial({
  uniforms, vertexShader: vert, fragmentShader: frag,
  transparent: true, depthTest: false, depthWrite: false,
  blending: THREE.NormalBlending,
});
const points = new THREE.Points(geo, mat);
scene.add(points);

/* ===== 滑鼠 → 世界座標（z=0 平面） + 水波生成 ===== */
const ndc = new THREE.Vector2(99, 99);
const raycaster = new THREE.Raycaster();
const plane = new THREE.Plane(new THREE.Vector3(0,0,1), 0);
const hit = new THREE.Vector3();
let lastSpawn = 0, lastMX = 0, lastMY = 0, mouseInside = false;
const ripples = []; // {x,y,age}

addEventListener('pointermove', e => {
  cur.tx = e.clientX; cur.ty = e.clientY;
  mouseInside = true;
  ndc.set(e.clientX/innerWidth*2 - 1, -(e.clientY/innerHeight)*2 + 1);
  raycaster.setFromCamera(ndc, cam);
  if (raycaster.ray.intersectPlane(plane, hit)){
    uniforms.uMouse.value.copy(hit);
  }
  uniforms.uMouseStr.value = 0.26;     // 撥開力道（移動時拉滿）
  // 依移動速度灑下水波
  const now = performance.now();
  const dist = Math.hypot(e.clientX-lastMX, e.clientY-lastMY);
  if (now - lastSpawn > 45 && dist > 3){
    spawnRipple(hit.x, hit.y);
    lastSpawn = now; lastMX = e.clientX; lastMY = e.clientY;
  }
});
addEventListener('pointerdown', () => { spawnRipple(uniforms.uMouse.value.x, uniforms.uMouse.value.y); });
addEventListener('pointerleave', () => { mouseInside = false; });

function spawnRipple(x, y){
  ripples.push({ x, y, age: 0 });
  if (ripples.length > MAX_RIPPLES) ripples.shift();
}

/* ===== hover 作品：增強虹光 ===== */
let hoverTarget = 0;
function switchTo(i){ hoverTarget = i < 0 ? 0 : 1; }

/* ===== resize ===== */
function resize(){
  renderer.setSize(innerWidth, innerHeight);
  cam.aspect = innerWidth/innerHeight; cam.updateProjectionMatrix();
  uniforms.uSize.value = Math.min(devicePixelRatio, 2);
}
addEventListener('resize', resize); resize();

/* ===== 動畫循環 ===== */
let t0 = performance.now();
function frame(){
  const now = performance.now();
  const dt = Math.min(0.05, (now - t0)/1000); t0 = now;
  uniforms.uTime.value += dt;

  // 游標球
  cur.x += (cur.tx-cur.x)*.18; cur.y += (cur.ty-cur.y)*.18;
  cursor.style.transform = `translate(${cur.x}px,${cur.y}px) translate(-50%,-50%)`;

  // 貓眼注視
  { const dx=cur.tx-fc.x, dy=cur.ty-fc.y, d=Math.hypot(dx,dy)||1, k=Math.min(1,d/260)*4.6;
    const ox=(dx/d*k).toFixed(1), oy=(dy/d*k).toFixed(1);
    pupils.forEach(p=>p.setAttribute('transform',`translate(${ox} ${oy})`)); }

  // 滑鼠撥開力道在靜止/離開時緩緩鬆手，X 重新聚合
  if (!mouseInside) uniforms.uMouseStr.value *= 0.92;
  else uniforms.uMouseStr.value *= 0.96;

  // hover 虹光過渡
  uniforms.uHover.value += (hoverTarget - uniforms.uHover.value) * 0.06;
  uniforms.uColor.value = 0.85 + uniforms.uHover.value * 0.5;

  // 偶爾自動冒一圈水波，畫面常保流動
  if (Math.random() < 0.012){
    spawnRipple((Math.random()*2-1)*1.6, (Math.random()*2-1)*1.6);
  }

  // 更新水波（年齡增長、消亡）
  for (let i=ripples.length-1; i>=0; i--){
    ripples[i].age += dt * 1.5;
    if (ripples[i].age > 2.0) ripples.splice(i, 1);
  }
  for (let i=0;i<MAX_RIPPLES;i++){
    const rp = ripples[i];
    if (rp) ripUniform[i].set(rp.x, rp.y, rp.age);
    else ripUniform[i].set(0, 0, 99); // 失效（life=0）
  }
  uniforms.uRippleCount.value = ripples.length;

  renderer.render(scene, cam);
  requestAnimationFrame(frame);
}
frame();
</script>
</body>
</html>
